services:
  db:
    image: postgres:15-alpine
    container_name: glacis-webhook-db
    environment:
      POSTGRES_DB: glacis
      POSTGRES_USER: glacis
      POSTGRES_PASSWORD: glacis
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glacis -d glacis"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
